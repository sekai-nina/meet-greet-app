name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Lint
        run: npx expo lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx jest --forceExit --ci --passWithNoTests

      - name: Gitleaks
        run: gitleaks detect --verbose
