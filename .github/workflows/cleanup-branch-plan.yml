name: Cleanup branch plan

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove branch-plan.md if exists
        run: |
          if [ -f .claude/branch-plan.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm .claude/branch-plan.md
            git commit -m ":balloon: branch-plan.md を削除"
            git push
          fi
