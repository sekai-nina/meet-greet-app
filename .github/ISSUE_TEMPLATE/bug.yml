name: バグ報告
description: バグや不具合の報告
labels: ["bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 現象
      description: 何が起きているか
      placeholder: "例: ログイン画面でメール送信後、確認画面に遷移しない"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 再現するための手順
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どうなるべきか
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: スクリーンショット、エラーログなど
    validations:
      required: false
